// ================================================================
// Left 4 Dead 2 Server Configuration
// Generated by L4D2 Dedicated Server Manager
// ================================================================

/////////////////////////
// SERVER INFO
/////////////////////////
hostname "{{HOSTNAME}}"
rcon_password "{{RCON_PASSWORD}}"
sv_search_key "{{SEARCH_KEY}}"
sv_steamgroup "{{STEAM_GROUP}}"
sv_steamgroup_exclusive 0

/////////////////////////
// INTERNET & REGION
/////////////////////////
sv_lan 0
sv_region 255
sv_allow_lobby_connect_only 0

/////////////////////////
// COMMUNICATION
/////////////////////////
sv_voiceenable 1
sv_alltalk 1

/////////////////////////
// GAME SETTINGS
/////////////////////////
sv_maxplayers 8
difficulty 1

/////////////////////////
// NETWORK & PERFORMANCE
/////////////////////////
sv_tickrate 64
sv_mincmdrate 10
sv_maxcmdrate 66
sv_minrate 5000
sv_maxrate 30000
fps_max 300

/////////////////////////
// LOGGING
/////////////////////////
log on
sv_logecho 0
sv_logfile 1
sv_log_onefile 0
sv_logbans 1
sv_logflush 1
sv_logsdir logs

/////////////////////////
// BANS
/////////////////////////
exec banned_user.cfg
exec banned_ip.cfg
writeip
writeid